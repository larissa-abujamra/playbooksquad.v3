<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Entrar · Playbook squad.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fustat:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Reusa o mesmo shell + classes do signup pra manter look idêntico. -->
<div class="overview signup-page" id="overview">
  <div class="ov-shell signup-shell">

    <header class="ov-nav">
      <a href="home.html" class="brand"><img src="imgs/squad.png" class="brand-logo" alt="squad.com"></a>
      <span class="badge">Playbook · Confeitarias</span>
    </header>

    <main class="signup-main">
      <section class="signup-card" aria-labelledby="signin-title">
        <div class="ov-eyebrow">Bem-vindo de volta</div>
        <h1 class="signup-title" id="signin-title">Entrar na sua conta</h1>
        <p class="signup-lede">Continue de onde parou no seu treinamento.</p>

        <form id="signin-form" class="signup-form" novalidate>
          <label class="signup-field">
            <span class="signup-label">Seu e-mail</span>
            <input
              type="email"
              name="email"
              id="signin-email"
              placeholder="larissa@confeitaria.com"
              autocomplete="email"
              required
              maxlength="120"
            />
          </label>

          <label class="signup-field">
            <span class="signup-label">Senha</span>
            <div class="signup-password-wrap">
              <input
                type="password"
                name="password"
                id="signin-password"
                placeholder="Sua senha"
                autocomplete="current-password"
                required
                minlength="1"
                maxlength="72"
              />
              <button type="button" class="signup-password-toggle" id="signin-password-toggle"
                      aria-label="Mostrar senha" aria-pressed="false">
                <svg class="ico-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <svg class="ico-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M3 3l18 18M10.6 6.1A9.4 9.4 0 0 1 12 6c6.5 0 10 6 10 6a17.6 17.6 0 0 1-3.4 4.1M6.6 6.6A17.4 17.4 0 0 0 2 12s3.5 6 10 6c1.4 0 2.7-.3 3.9-.7M9.9 9.9a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </label>

          <button type="submit" id="signin-submit" class="btn-glow" disabled>
            <span class="btn-glow-bg"></span>
            <span class="btn-glow-content">
              <span class="signin-submit-label">Entrar</span>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
        </form>

        <p class="signup-error" id="signin-error" role="alert" hidden></p>

        <!-- Link discreto pra quem ainda não tem conta -->
        <p class="signup-altlink">
          Ainda não tem conta?
          <a href="signup.html">Criar conta</a>
        </p>
      </section>
    </main>

    <footer class="ov-foot">
      <span>squad.com · Playbook para Confeitarias</span>
      <span>2026</span>
    </footer>

  </div>
</div>

<script>
/* ================================================================
   Signin — login via Supabase Auth (email + senha).
   ----------------------------------------------------------------
   - Endpoint: POST /auth/v1/token?grant_type=password
   - Em sucesso: salva access_token + refresh_token em
     localStorage["squad-session"], grava user em ["squad-user"]
     (com nome vindo de user.user_metadata.nome) e redireciona pra
     setup.html.
   - Erros mais comuns tratados: credenciais inválidas, email não
     confirmado, rate limit.
   ================================================================ */
(() => {
  const SUPABASE_URL = 'https://xkgepeejugrlgtavcxqb.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrZ2VwZWVqdWdybGd0YXZjeHFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODU0MjIsImV4cCI6MjA5NTU2MTQyMn0.s7JKeTqkG14boQcH00eGv4CKSzeYJPY8zud8WMe4pQc';

  const form        = document.getElementById('signin-form');
  const emailEl     = document.getElementById('signin-email');
  const passEl      = document.getElementById('signin-password');
  const passToggle  = document.getElementById('signin-password-toggle');
  const submitBtn   = document.getElementById('signin-submit');
  const submitLbl   = submitBtn.querySelector('.signin-submit-label');
  const errorEl     = document.getElementById('signin-error');

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  const isValid = () => {
    return EMAIL_RE.test(emailEl.value.trim()) && passEl.value.length >= 1;
  };
  const syncSubmit = () => {
    submitBtn.disabled = !isValid();
    if (!errorEl.hidden) errorEl.hidden = true;
  };
  emailEl.addEventListener('input', syncSubmit);
  passEl.addEventListener('input', syncSubmit);
  syncSubmit();

  // Toggle olhinho da senha
  passToggle.addEventListener('click', () => {
    const showing = passEl.type === 'text';
    passEl.type = showing ? 'password' : 'text';
    passToggle.setAttribute('aria-pressed', String(!showing));
    passToggle.setAttribute('aria-label', showing ? 'Mostrar senha' : 'Esconder senha');
    passToggle.classList.toggle('is-showing', !showing);
  });

  function friendlyError(status, detail) {
    const text = (detail || '').toLowerCase();
    if (status === 400) {
      if (text.includes('invalid login') || text.includes('invalid_grant')) {
        return 'E-mail ou senha incorretos. Confira e tente de novo.';
      }
      if (text.includes('email not confirmed')) {
        return 'Verifique seu e-mail pra confirmar a conta antes de entrar.';
      }
    }
    if (status === 429) {
      return 'Muitas tentativas em pouco tempo. Aguarde um minuto e tente de novo.';
    }
    return 'Não conseguimos entrar agora. Verifique sua conexão e tente de novo.';
  }

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    if (!isValid() || submitBtn.disabled) return;

    submitBtn.disabled = true;
    submitLbl.textContent = 'Entrando…';
    errorEl.hidden = true;

    const email = emailEl.value.trim().toLowerCase();
    const pass  = passEl.value;

    try {
      const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: {
          'apikey':       SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ email, password: pass }),
      });

      const json = await res.json().catch(() => ({}));

      if (!res.ok) {
        const detail = json.error_description || json.msg || json.message || JSON.stringify(json);
        throw Object.assign(new Error('HTTP ' + res.status + ' — ' + detail), {
          status: res.status,
          detail,
        });
      }

      // Sessão chega imediatamente no login (diferente do signup com confirm pendente)
      const user = json.user || {};
      const nome = (user.user_metadata && user.user_metadata.nome) || '';

      try {
        localStorage.setItem('squad-user', JSON.stringify({
          nome,
          email,
          userId:    user.id,
          createdAt: new Date().toISOString(),
        }));
        localStorage.setItem('squad-session', JSON.stringify({
          access_token:  json.access_token,
          refresh_token: json.refresh_token,
          expires_at:    json.expires_at,
        }));
      } catch (_) {}

      window.location.href = 'setup.html';
    } catch (err) {
      console.error('[signin] erro ao entrar:', err);
      errorEl.hidden = false;
      errorEl.textContent = friendlyError(err.status, err.detail);
      submitLbl.textContent = 'Entrar';
      submitBtn.disabled = false;
    }
  });
})();
</script>

</body>
</html>
