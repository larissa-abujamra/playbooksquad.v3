<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vamos começar · Playbook squad.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fustat:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Shell .overview (sem sidebar) — mesma estrutura visual da home. -->
<div class="overview signup-page" id="overview">
  <div class="ov-shell signup-shell">

    <header class="ov-nav">
      <a href="home.html" class="brand"><img src="imgs/squad.png" class="brand-logo" alt="squad.com"></a>
      <span class="badge">Playbook · Confeitarias</span>
    </header>

    <main class="signup-main">
      <section class="signup-card" aria-labelledby="signup-title">
        <div class="ov-eyebrow">Antes de começar</div>
        <h1 class="signup-title" id="signup-title">Como podemos te chamar?</h1>
        <p class="signup-lede">Em menos de 20 segundos a gente já libera seu treinamento.</p>

        <form id="signup-form" class="signup-form" novalidate>
          <label class="signup-field">
            <span class="signup-label">Seu nome</span>
            <input
              type="text"
              name="nome"
              id="signup-nome"
              placeholder="Ex: Maria"
              autocomplete="name"
              required
              minlength="2"
              maxlength="80"
            />
          </label>

          <label class="signup-field">
            <span class="signup-label">Seu WhatsApp</span>
            <input
              type="tel"
              name="telefone"
              id="signup-telefone"
              placeholder="(00) 00000-0000"
              autocomplete="tel-national"
              inputmode="numeric"
              required
              maxlength="16"
            />
            <span class="signup-field-hint">Com DDD. A gente usa pra te encontrar caso precise.</span>
          </label>

          <button type="submit" id="signup-submit" class="btn-glow" disabled>
            <span class="btn-glow-bg"></span>
            <span class="btn-glow-content">
              <span class="signup-submit-label">Avançar</span>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
        </form>

        <p class="signup-error" id="signup-error" role="alert" hidden></p>
      </section>
    </main>

    <footer class="ov-foot">
      <span>squad.com · Playbook para Confeitarias</span>
      <span>2026</span>
    </footer>

  </div>
</div>

<script>
/* ================================================================
   Signup — formulário simples (nome + telefone).
   ----------------------------------------------------------------
   - Sem auth, sem senha, sem fetch ao Supabase aqui. É só um form
     que persiste o user no localStorage e redireciona pro setup.
   - As respostas do wizard vão pro Supabase depois (main.js usa
     o `telefone` do localStorage["squad-user"] como chave do upsert).
   - Máscara brasileira: formata enquanto digita; aceita 10 ou 11
     dígitos (DDD + 8 ou 9 dígitos). O localStorage guarda APENAS
     os dígitos (sem máscara) pra facilitar query/dedupe depois.
   ================================================================ */
(() => {
  const form        = document.getElementById('signup-form');
  const nomeEl      = document.getElementById('signup-nome');
  const telEl       = document.getElementById('signup-telefone');
  const submitBtn   = document.getElementById('signup-submit');
  const submitLbl   = submitBtn.querySelector('.signup-submit-label');
  const errorEl     = document.getElementById('signup-error');

  // ---------- Máscara de telefone BR ----------
  // 10 dígitos: (00) 0000-0000  ·  11 dígitos: (00) 00000-0000
  function onlyDigits(s)  { return s.replace(/\D/g, ''); }
  function formatPhone(raw) {
    const d = onlyDigits(raw).slice(0, 11);
    if (d.length === 0) return '';
    if (d.length <= 2)  return '(' + d;
    if (d.length <= 6)  return '(' + d.slice(0,2) + ') ' + d.slice(2);
    if (d.length <= 10) return '(' + d.slice(0,2) + ') ' + d.slice(2,6) + '-' + d.slice(6);
    return '(' + d.slice(0,2) + ') ' + d.slice(2,7) + '-' + d.slice(7);
  }
  telEl.addEventListener('input', () => {
    telEl.value = formatPhone(telEl.value);
    syncSubmit();
  });
  // Cole formatado (paste handler)
  telEl.addEventListener('paste', (ev) => {
    ev.preventDefault();
    const text = (ev.clipboardData || window.clipboardData).getData('text');
    telEl.value = formatPhone(text);
    syncSubmit();
  });

  // ---------- Validação ----------
  const isValid = () => {
    const nome = nomeEl.value.trim();
    const tel  = onlyDigits(telEl.value);
    return nome.length >= 2 && (tel.length === 10 || tel.length === 11);
  };
  const syncSubmit = () => {
    submitBtn.disabled = !isValid();
    if (!errorEl.hidden) errorEl.hidden = true;
  };
  nomeEl.addEventListener('input', syncSubmit);
  syncSubmit();

  // ---------- Submit ----------
  form.addEventListener('submit', (ev) => {
    ev.preventDefault();
    if (!isValid() || submitBtn.disabled) return;

    const nome = nomeEl.value.trim();
    const telefone = onlyDigits(telEl.value);   // sem máscara, só dígitos

    try {
      localStorage.setItem('squad-user', JSON.stringify({
        nome,
        telefone,
        createdAt: new Date().toISOString(),
      }));
    } catch (_) {
      // localStorage bloqueado (modo privado etc) — segue mesmo assim
      errorEl.hidden = false;
      errorEl.textContent = 'Não conseguimos salvar seus dados localmente. Tente desativar o modo anônimo do navegador.';
      return;
    }

    // Limpa qualquer resíduo do antigo fluxo de auth
    try { localStorage.removeItem('squad-session'); } catch (_) {}

    window.location.href = 'setup.html';
  });
})();
</script>

</body>
</html>
