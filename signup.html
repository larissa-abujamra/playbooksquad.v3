<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vamos começar · Playbook squad.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fustat:wght@200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Reutiliza o shell .overview da home pra manter o look (sem sidebar).
     Estrutura: ov-nav + card central com formulário + ov-foot. -->
<div class="overview signup-page" id="overview">
  <div class="ov-shell signup-shell">

    <header class="ov-nav">
      <a href="home.html" class="brand"><img src="imgs/squad.png" class="brand-logo" alt="squad.com"></a>
      <span class="badge">Playbook · Confeitarias</span>
    </header>

    <main class="signup-main">
      <section class="signup-card" aria-labelledby="signup-title">
        <div class="ov-eyebrow">Antes de começar</div>
        <h1 class="signup-title" id="signup-title">Como podemos te chamar?</h1>
        <p class="signup-lede">Em menos de 20 segundos a gente já libera seu treinamento.</p>

        <form id="signup-form" class="signup-form" novalidate>
          <label class="signup-field">
            <span class="signup-label">Seu nome</span>
            <input
              type="text"
              name="nome"
              id="signup-nome"
              placeholder="Ex: João"
              autocomplete="name"
              required
              minlength="2"
              maxlength="80"
            />
          </label>

          <label class="signup-field">
            <span class="signup-label">Seu e-mail</span>
            <input
              type="email"
              name="email"
              id="signup-email"
              placeholder="joão@confeitaria.com"
              autocomplete="email"
              required
              maxlength="120"
            />
          </label>

          <label class="signup-field">
            <span class="signup-label">Senha</span>
            <div class="signup-password-wrap">
              <input
                type="password"
                name="password"
                id="signup-password"
                placeholder="Mínimo 8 caracteres"
                autocomplete="new-password"
                required
                minlength="8"
                maxlength="72"
              />
              <button type="button" class="signup-password-toggle" id="signup-password-toggle"
                      aria-label="Mostrar senha" aria-pressed="false">
                <svg class="ico-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <svg class="ico-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M3 3l18 18M10.6 6.1A9.4 9.4 0 0 1 12 6c6.5 0 10 6 10 6a17.6 17.6 0 0 1-3.4 4.1M6.6 6.6A17.4 17.4 0 0 0 2 12s3.5 6 10 6c1.4 0 2.7-.3 3.9-.7M9.9 9.9a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <span class="signup-field-hint">Mínimo 8 caracteres. Use uma senha que você lembre.</span>
          </label>

          <button type="submit" id="signup-submit" class="btn-glow" disabled>
            <span class="btn-glow-bg"></span>
            <span class="btn-glow-content">
              <span class="signup-submit-label">Continuar</span>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
        </form>

        <p class="signup-error" id="signup-error" role="alert" hidden></p>

        <!-- Link discreto pra quem já tem conta -->
        <p class="signup-altlink">
          Já tem uma conta?
          <a href="signin.html">Entrar</a>
        </p>
      </section>
    </main>

    <footer class="ov-foot">
      <span>squad.com · Playbook para Confeitarias</span>
      <span>2026</span>
    </footer>

  </div>
</div>

<script>
/* ================================================================
   Signup — cria conta via Supabase Auth (nome + email + senha).
   ----------------------------------------------------------------
   IMPORTANTE: troca pra Supabase Auth (POST /auth/v1/signup) em vez
   de inserir manualmente em public.users. Razões:
     · Senha entra HASHED (bcrypt) automaticamente — nunca em texto
       plano. Inserir senha numa tabela "users" comum seria grave.
     · O Supabase gerencia sessão, recuperação de senha, confirmação
       de email, rate-limit, etc.
     · O nome vai como user_metadata.nome.
     · Validação: nome ≥ 2 chars, email regex básico, senha ≥ 8 chars.
     · Tratamento dos erros mais comuns (email duplicado, senha
       fraca, confirmação de email pendente).
     · localStorage["squad-user"] continua sendo escrito pra próximas
       telas (setup/wizard) usarem nome/email sem precisar query auth.
   ================================================================ */
(() => {
  const SUPABASE_URL = 'https://xkgepeejugrlgtavcxqb.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrZ2VwZWVqdWdybGd0YXZjeHFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODU0MjIsImV4cCI6MjA5NTU2MTQyMn0.s7JKeTqkG14boQcH00eGv4CKSzeYJPY8zud8WMe4pQc';

  const form         = document.getElementById('signup-form');
  const nomeEl       = document.getElementById('signup-nome');
  const emailEl      = document.getElementById('signup-email');
  const passEl       = document.getElementById('signup-password');
  const passToggle   = document.getElementById('signup-password-toggle');
  const submitBtn    = document.getElementById('signup-submit');
  const submitLbl    = submitBtn.querySelector('.signup-submit-label');
  const errorEl      = document.getElementById('signup-error');

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const PASS_MIN = 8;

  const isValid = () => {
    const nome  = nomeEl.value.trim();
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    return nome.length >= 2
        && EMAIL_RE.test(email)
        && pass.length >= PASS_MIN;
  };
  const syncSubmit = () => {
    submitBtn.disabled = !isValid();
    if (!errorEl.hidden) errorEl.hidden = true;   // limpa erro quando user edita
  };
  nomeEl.addEventListener('input', syncSubmit);
  emailEl.addEventListener('input', syncSubmit);
  passEl.addEventListener('input', syncSubmit);
  syncSubmit();

  // Toggle mostrar/esconder senha (olhinho)
  passToggle.addEventListener('click', () => {
    const showing = passEl.type === 'text';
    passEl.type = showing ? 'password' : 'text';
    passToggle.setAttribute('aria-pressed', String(!showing));
    passToggle.setAttribute('aria-label', showing ? 'Mostrar senha' : 'Esconder senha');
    passToggle.classList.toggle('is-showing', !showing);
  });

  // Mensagens amigáveis pros erros mais comuns do auth/signup
  function friendlyError(status, detail) {
    const text = (detail || '').toLowerCase();
    if (status === 400) {
      if (text.includes('already registered') || text.includes('already been registered')
       || text.includes('user already')) {
        return 'Esse e-mail já está cadastrado. Tenta entrar em vez de criar uma conta nova.';
      }
      if (text.includes('password') && (text.includes('weak') || text.includes('short'))) {
        return 'Senha muito curta ou fraca. Use no mínimo 8 caracteres.';
      }
      if (text.includes('email') && text.includes('invalid')) {
        return 'E-mail inválido. Confira e tente de novo.';
      }
    }
    if (status === 422) {
      return 'Algum dado está fora do formato. Confira e-mail e senha.';
    }
    if (status === 429) {
      return 'Muitas tentativas em pouco tempo. Aguarde um minuto e tente de novo.';
    }
    return 'Não conseguimos salvar agora. Verifique sua conexão e tente de novo.';
  }

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    if (!isValid() || submitBtn.disabled) return;

    submitBtn.disabled = true;
    submitLbl.textContent = 'Salvando…';
    errorEl.hidden = true;

    const nome  = nomeEl.value.trim();
    const email = emailEl.value.trim().toLowerCase();
    const pass  = passEl.value;

    try {
      const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
        method: 'POST',
        headers: {
          'apikey':       SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          email,
          password: pass,
          data: { nome },          // vai pra user_metadata.nome em auth.users
        }),
      });

      const json = await res.json().catch(() => ({}));

      if (!res.ok) {
        const detail = json.msg || json.message || json.error_description || JSON.stringify(json);
        throw Object.assign(new Error('HTTP ' + res.status + ' — ' + detail), {
          status: res.status,
          detail,
        });
      }

      // Persiste localmente pro setup/wizard usar
      try {
        localStorage.setItem('squad-user', JSON.stringify({
          nome,
          email,
          // user_id do Supabase Auth — útil pra próximas requests
          userId: json.user && json.user.id,
          createdAt: new Date().toISOString(),
        }));
        // Sessão (se o projeto não exige confirmation): salva o token
        if (json.access_token) {
          localStorage.setItem('squad-session', JSON.stringify({
            access_token:  json.access_token,
            refresh_token: json.refresh_token,
            expires_at:    json.expires_at,
          }));
        }
      } catch (_) {}

      // Se "Confirm email" está ligado no projeto, a session não vem agora.
      // O user precisa abrir o email pra confirmar. Avisa em vez de redirecionar.
      const confirmacaoPendente = !json.access_token && json.user && !json.user.confirmed_at;
      if (confirmacaoPendente) {
        errorEl.hidden = false;
        errorEl.classList.add('is-info');
        errorEl.textContent = 'Conta criada! Verifique seu e-mail pra confirmar o cadastro e voltar pra continuar.';
        submitLbl.textContent = 'Aguardando confirmação';
        return;
      }

      // Tudo certo — pro setup
      window.location.href = 'setup.html';
    } catch (err) {
      console.error('[signup] erro ao salvar:', err);
      errorEl.hidden = false;
      errorEl.classList.remove('is-info');
      errorEl.textContent = friendlyError(err.status, err.detail);
      submitLbl.textContent = 'Continuar';
      submitBtn.disabled = false;
    }
  });
})();
</script>

</body>
</html>
