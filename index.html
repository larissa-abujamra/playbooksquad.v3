<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Playbook squad.com — Confeitarias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- ============ APP (fase 2: setup) ============ -->
<div class="app">

  <!-- ============ SIDEBAR (desktop) ============ -->
  <aside class="sidebar" aria-label="Navegação">
    <a href="home.html" class="brand"><span class="dot" aria-hidden="true"></span>squad.com</a>
    <div class="brand-sub">Playbook · Confeitarias</div>

    <a class="nav-link back-link" href="home.html">
      <span class="ico"><svg viewBox="0 0 16 16" fill="none"><path d="M9.5 3.5L5.5 8l4 4.5M5.5 8h7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      Voltar à home
    </a>
  </aside>

  <!-- Waz espiando, fixo na borda da sidebar -->
  <img class="waz-peek" src="imgs/wazcharacter.png" alt="" aria-hidden="true">
  <!-- Maky espiando, na borda direita da tela (um pouco acima do Waz) -->
  <img class="maky-peek" src="imgs/makycharacter.png" alt="" aria-hidden="true">

  <!-- ============ MAIN CONTENT ============ -->
  <main class="content" id="top">

    <!-- Mobile header -->
    <header class="mobile-header">
      <a href="#top" class="brand"><span class="dot" aria-hidden="true"></span>squad.com</a>
      <select id="mobile-nav" aria-label="Ir para seção">
        <optgroup label="Setup">
          <option value="#setup">Setup (visão geral)</option>
          <option value="#stage-1">① Treine seus agentes</option>
          <option value="#stage-2">② Monte seu catálogo</option>
          <option value="#stage-3">③ Integrações</option>
          <option value="#stage-4">④ Piloto automático</option>
        </optgroup>
        <optgroup label="Mais">
          <option value="#faq">Dúvidas comuns</option>
          <option value="#suporte">Suporte</option>
        </optgroup>
      </select>
    </header>

    <!-- Progress Tracker -->
    <div class="doc">

    </div>
  </main>
</div>

<!-- ============ WIZARD (treinamento guiado de agentes) ============ -->
<div class="wizard" id="wizard" role="dialog" aria-modal="true" aria-labelledby="wizard-question-text" aria-hidden="true">
  <header class="wizard-header">
    <button class="wizard-close" type="button" id="wizard-close" aria-label="Fechar treinamento">
      <svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M10 3l-5 5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="wizard-progress" aria-live="polite">
      <div class="wizard-progress-track"><div class="wizard-progress-fill" id="wizard-progress-fill"></div></div>
      <span class="wizard-progress-text" id="wizard-progress-text">1 de 13</span>
    </div>
    <button class="wizard-skip" type="button" id="wizard-skip">Pular</button>
  </header>
  <main class="wizard-stage">
    <div class="wizard-card" id="wizard-card"></div>
  </main>
</div>

<script src="main.js"></script>

</body>
</html>
